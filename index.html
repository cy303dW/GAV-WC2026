<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC2026 Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--bg4:#222d42;--bg5:#2a3550;
  --gold:#f5c842;--gold2:#e6a800;--silver:#b0bec5;--bronze:#cd7f32;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--amber:#f59e0b;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --radius:12px;--rsm:8px;
}
.light{
  --bg:#f0f2f7;--bg2:#ffffff;--bg3:#f1f5f9;--bg4:#e2e8f0;--bg5:#d1d9e6;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;transition:background 0.3s,color 0.3s;}
.app{display:flex;flex-direction:column;min-height:100vh;}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:1px;color:var(--gold);display:flex;align-items:center;gap:8px;}
.logo span{color:var(--text);}
.header-right{display:flex;align-items:center;gap:10px;}
.icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background 0.2s;}
.icon-btn:hover{background:var(--bg4);}
.player-chip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:30px;padding:5px 12px 5px 6px;cursor:pointer;transition:background 0.2s;}
.player-chip:hover{background:var(--bg4);}
.chip-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.chip-name{font-size:14px;font-weight:500;}

/* NAV */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:none;color:var(--text2);padding:14px 18px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:0.5px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all 0.2s;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* MAIN */
.main{flex:1;padding:1.25rem;max-width:1100px;margin:0 auto;width:100%;}

/* REMINDER BANNER */
.reminder-banner{border-radius:var(--radius);padding:12px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:12px;transition:background 0.5s,border 0.5s;}
.reminder-normal{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);}
.reminder-warning{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.4);}
.reminder-urgent{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.4);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
.reminder-icon{font-size:20px;flex-shrink:0;}
.reminder-text{flex:1;}
.reminder-title{font-size:14px;font-weight:600;}
.reminder-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.reminder-normal .reminder-title{color:var(--blue);}
.reminder-warning .reminder-title{color:var(--amber);}
.reminder-urgent .reminder-title{color:var(--red);}

/* COUNTDOWN */
.countdown-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px;}
.countdown-left{}
.countdown-label{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
.countdown-match{font-size:14px;font-weight:500;margin-top:4px;}
.countdown-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.countdown-timer{display:flex;gap:16px;}
.count-unit{text-align:center;}
.count-num{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:var(--gold);line-height:1;}
.count-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* HOME GRID */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
@media(max-width:680px){.home-grid{grid-template-columns:1fr;}}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
.lb-row:last-child{border-bottom:none;}
.lb-pos{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;width:28px;text-align:center;flex-shrink:0;}
.pos-1{color:var(--gold);}
.pos-2{color:var(--silver);}
.pos-3{color:var(--bronze);}
.pos-other{color:var(--text3);}
.lb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.lb-name{flex:1;font-weight:500;}
.lb-pts-wrap{text-align:right;}
.lb-pts{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;}
.lb-pts-lbl{font-size:11px;color:var(--text3);}
.lb-you-row{background:rgba(245,200,66,0.06);border-radius:var(--rsm);padding:10px 8px;margin:0 -8px;border-bottom:none!important;}

/* MATCH MINI */
.match-mini{background:var(--bg3);border-radius:var(--rsm);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.match-mini:last-child{margin-bottom:0;}
.mm-teams{flex:1;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.mm-team{font-size:13px;font-weight:500;flex:1;}
.mm-team.home{text-align:right;}
.mm-vs{font-size:11px;color:var(--text3);font-weight:700;flex-shrink:0;}
.mm-meta{font-size:11px;color:var(--text3);white-space:nowrap;}
.mm-time{font-size:11px;color:var(--gold);}

/* BUTTONS */
.btn{border:none;border-radius:var(--rsm);padding:7px 14px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-done{background:var(--bg4);color:var(--text3);cursor:default;}
.btn-admin{background:var(--blue);color:#fff;}
.btn-admin:hover{opacity:0.85;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{opacity:0.85;}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{background:var(--bg4);}
.btn-wide{width:100%;margin-top:8px;text-align:center;}

/* SECTION HEADER */
.section-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:12px;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:0.5px;}
.section-sub{font-size:13px;color:var(--text3);margin-top:2px;}

/* ROUND FILTER */
.round-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.rfbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 13px;border-radius:20px;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'Barlow',sans-serif;}
.rfbtn:hover{border-color:var(--border2);color:var(--text);}
.rfbtn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600;}

/* MATCH FULL */
.match-full{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:10px;}
.mf-home{text-align:right;}
.mf-flag{font-size:22px;display:block;margin-bottom:2px;}
.mf-name{font-size:14px;font-weight:500;}
.mf-group{font-size:11px;color:var(--text3);}
.mf-score-box{background:var(--bg3);border-radius:6px;padding:6px 10px;text-align:center;min-width:64px;}
.mf-score-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;}
.mf-score-val.live{color:var(--green);}
.mf-score-val.upcoming{color:var(--text3);font-size:14px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:0.5px;text-transform:uppercase;margin-top:3px;}
.badge-live{background:rgba(34,197,94,0.15);color:var(--green);}
.badge-up{background:rgba(59,130,246,0.15);color:var(--blue);}
.badge-done{background:var(--bg4);color:var(--text3);}
.badge-ko{background:rgba(245,200,66,0.12);color:var(--gold);}
.pred-hint{font-size:11px;color:var(--text3);margin-top:4px;}

/* PREDICT TAB */
.pred-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.pred-info{flex:1;min-width:160px;}
.pred-match-name{font-size:14px;font-weight:500;}
.pred-round{font-size:11px;color:var(--text3);margin-top:2px;}
.pred-status{font-size:13px;}
.pred-pts-val{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;}
.pts-earned{color:var(--green);}
.pts-missed{color:var(--red);}
.pts-pending{color:var(--text3);}

/* LEADERBOARD FULL */
.lb-full-row{display:flex;align-items:center;padding:14px 10px;border-bottom:1px solid var(--border);gap:12px;border-radius:var(--rsm);transition:background 0.15s;}
.lb-full-row:last-child{border-bottom:none;}
.lb-full-me{background:rgba(245,200,66,0.06);}

/* RULES */
.rules-h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:0.5px;margin-bottom:0.75rem;}
.rtable{width:100%;border-collapse:collapse;}
.rtable th{background:var(--bg3);color:var(--text3);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.rtable td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);font-size:14px;}
.rtable tr:last-child td{border-bottom:none;}
.rtable td:first-child{font-weight:500;color:var(--text);}
.rtable .pts-cell{color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;}
.payout-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.payout-row:last-child{border-bottom:none;}
.payout-pos{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;width:40px;flex-shrink:0;}
.payout-bar-bg{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.payout-bar-fill{height:100%;border-radius:4px;}
.payout-amt{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;min-width:70px;text-align:right;}
.payout-ret{font-size:12px;min-width:55px;text-align:right;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:1.25rem;}
.modal-teams-bar{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:var(--rsm);padding:14px 16px;margin-bottom:1.25rem;}
.mt-flag{font-size:28px;display:block;text-align:center;margin-bottom:4px;}
.mt-name{font-size:15px;font-weight:600;text-align:center;}
.mt-vs{font-size:13px;color:var(--text3);font-weight:700;}
.modal-label{font-size:13px;color:var(--text3);font-weight:500;margin-bottom:8px;}
.score-sel{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:1.25rem;}
.stepper{display:flex;flex-direction:column;align-items:center;gap:8px;}
.step-btn{width:34px;height:34px;background:var(--bg4);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;line-height:1;}
.step-btn:hover{background:var(--bg5);}
.score-num{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:800;color:var(--gold);min-width:52px;text-align:center;line-height:1;}
.score-sep{font-family:'Barlow Condensed',sans-serif;font-size:32px;color:var(--text3);margin-top:8px;}
.result-sel{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:var(--rsm);font-family:'Barlow',sans-serif;font-size:15px;margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:10px;margin-top:0.5rem;}
.btn-cancel{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:10px;border-radius:var(--rsm);font-family:'Barlow',sans-serif;font-weight:500;cursor:pointer;font-size:14px;}
.btn-submit{flex:2;background:var(--gold);border:none;color:#000;padding:10px;border-radius:var(--rsm);font-family:'Barlow',sans-serif;font-weight:700;cursor:pointer;font-size:14px;}
.pin-inputs{display:flex;gap:12px;justify-content:center;margin:1.25rem 0;}
.pin-input{width:52px;height:60px;background:var(--bg3);border:2px solid var(--border2);color:var(--text);text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;border-radius:var(--rsm);}
.pin-input:focus{outline:none;border-color:var(--gold);}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:var(--rsm);font-family:'Barlow',sans-serif;font-size:15px;margin-bottom:1rem;}
.form-input:focus{outline:none;border-color:var(--gold);}
.admin-toggle{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-radius:var(--rsm);margin-bottom:1rem;cursor:pointer;border:1px solid var(--border);}
.toggle-switch{width:40px;height:22px;background:var(--bg4);border-radius:11px;position:relative;transition:background 0.2s;flex-shrink:0;}
.toggle-switch.on{background:var(--gold);}
.toggle-knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left 0.2s;}
.toggle-switch.on .toggle-knob{left:20px;}

/* ONBOARDING */
.onboard-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.onboard-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:2rem;width:100%;max-width:400px;text-align:center;}
.onboard-logo{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;color:var(--gold);margin-bottom:0.5rem;}
.onboard-sub{font-size:14px;color:var(--text3);margin-bottom:2rem;}
.onboard-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:0.5rem;}
.onboard-desc{font-size:14px;color:var(--text2);margin-bottom:1.5rem;line-height:1.6;}
.color-picker{display:flex;gap:10px;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;}
.color-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s,border 0.15s;}
.color-dot:hover{transform:scale(1.1);}
.color-dot.selected{border-color:#fff;}
.error-msg{color:var(--red);font-size:13px;margin-top:8px;min-height:20px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:400;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.error{background:var(--red);}

/* SYNC INDICATOR */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background 0.3s;}
.sync-dot.syncing{background:var(--amber);animation:blink 1s infinite;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

.divider{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin:1.25rem 0 0.75rem;padding-bottom:6px;border-bottom:1px solid var(--border);}
.empty-state{text-align:center;padding:2rem;color:var(--text3);font-size:14px;}
</style>

// ─── SCORING ───────────────────────────────────────────────────────────────
function calcPoints(match, pred){
  if(!pred||!match.result) return null;
  const r=match.round, pts=POINTS[r], res=match.result;
  if(r==='group'){
    const actual = res.h>res.a?'h':res.h<res.a?'a':'d';
    return pred.result===actual ? pts.winner : 0;
  } else {
    const exactMatch = pred.h===res.h && pred.a===res.a;
    if(exactMatch) return pts.score;
    const actualW = res.h>res.a?'h':res.h<res.a?'a':'d';
    const predW = pred.h>pred.a?'h':pred.h<pred.a?'a':'d';
    return predW===actualW ? pts.winner : 0;
  }
}

function getPlayerTotals(){
  return S.players.map(p=>{
    let total=0,correctScores=0;
    S.matches.forEach(m=>{
      const pred=(S.predictions[p.slot]||{})[m.id];
      if(pred&&m.result){
        const pts=calcPoints(m,pred);
        if(pts){total+=pts;if(m.round!=='group'&&pts===POINTS[m.round].score)correctScores++;}
      }
    });
    return {...p,total,correctScores};
  }).sort((a,b)=>b.total-a.total||b.correctScores-a.correctScores);
}

function myPred(matchId){ return (S.predictions[S.mySlot]||{})[matchId]||null; }

// ─── GOOGLE SHEETS SYNC ────────────────────────────────────────────────────
// We use the public CSV export URLs for reading (no OAuth needed for public sheets)
// For writing, we rely on a Google Apps Script Web App deployed from the sheet.
// The Apps Script URL is stored after first setup.

let APPS_SCRIPT_URL = localStorage.getItem('wc2026_appsscript') || 'https://script.google.com/macros/s/AKfycbyXZE5SbCeZMipuD1fxiPVGlkv1DGXgszHfkvWFdB7wHc-Q_3yQitUMHLy6umPsG89TrQ/exec';

async function fetchSheetCSV(sheetName){
  const url = `${SHEETS_BASE}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const r = await fetch(url);
  if(!r.ok) throw new Error('Sheet fetch failed');
  return parseCSV(await r.text());
}

function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length<2) return [];
  const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)||[];
    const obj={};
    headers.forEach((h,i)=>{ obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim(); });
    return obj;
  });
}

async function syncFromSheets(){
  setSyncStatus('syncing');
  try{
    // Players
    const players = await fetchSheetCSV('Players');
    if(players.length>0){
      S.players = players.filter(p=>p.slot&&p.nickname).map(p=>({
        slot:parseInt(p.slot),nickname:p.nickname,color:p.color||'#f5c842',isAdmin:p.is_admin==='TRUE'||p.is_admin==='true'
      }));
    }
    // Predictions
    const preds = await fetchSheetCSV('Predictions');
    S.predictions={};
    preds.forEach(p=>{
      if(!p.match_id||!p.slot) return;
      const slot=parseInt(p.slot), mid=parseInt(p.match_id);
      if(!S.predictions[slot]) S.predictions[slot]={};
      try{ S.predictions[slot][mid]=JSON.parse(p.prediction); }catch(e){}
    });
    // Results
    const results = await fetchSheetCSV('Results');
    S.results={};
    results.forEach(r=>{
      if(!r.match_id) return;
      const mid=parseInt(r.match_id);
      S.results[mid]={h:parseInt(r.home_score)||0,a:parseInt(r.away_score)||0};
      // Apply results to matches
      const m=S.matches.find(x=>x.id===mid);
      if(m){m.result={h:parseInt(r.home_score)||0,a:parseInt(r.away_score)||0};m.status='done';}
    });
    setSyncStatus('ok');
  }catch(e){
    console.warn('Sync failed:',e);
    setSyncStatus('err');
  }
}

async function writeToSheet(sheetName, rowData){
  if(!APPS_SCRIPT_URL){
    // Fallback: show instructions
    showToast('Set up Apps Script to enable cloud saving',true);
    return false;
  }
  try{
    await fetch(APPS_SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sheet:sheetName,data:rowData})
    });
    return true;
  }catch(e){ return false; }
}

function setSyncStatus(s){
  S.syncStatus=s;
  const dot=document.getElementById('syncDot');
  if(dot){dot.className='sync-dot '+s;}
}

// ─── API-FOOTBALL ──────────────────────────────────────────────────────────
async function fetchLiveResults(){
  try{
    const r=await fetch(`https://v3.football.api-sports.io/fixtures?league=${WC2026_LEAGUE}&season=${WC2026_SEASON}&live=all`,{
      headers:{'x-apisports-key':APISPORTS_KEY}
    });
    const d=await r.json();
    if(d.response&&d.response.length>0){
      d.response.forEach(fix=>{
        const m=S.matches.find(x=>x.apiId===fix.fixture.id||(x.home===fix.teams.home.name&&x.away===fix.teams.away.name));
        if(m){
          m.result={h:fix.goals.home||0,a:fix.goals.away||0};
          m.status=fix.fixture.status.short==='FT'?'done':'live';
          m.apiId=fix.fixture.id;
        }
      });
    }
  }catch(e){ console.warn('API fetch failed',e); }
}

async function fetchUpcomingFixtures(){
  try{
    const r=await fetch(`https://v3.football.api-sports.io/fixtures?league=${WC2026_LEAGUE}&season=${WC2026_SEASON}&next=10`,{
      headers:{'x-apisports-key':APISPORTS_KEY}
    });
    const d=await r.json();
    if(d.response&&d.response.length>0){
      d.response.forEach(fix=>{
        const existing=S.matches.find(x=>x.home===fix.teams.home.name&&x.away===fix.teams.away.name);
        if(existing){existing.apiId=fix.fixture.id;}
      });
    }
  }catch(e){ console.warn('Upcoming fetch failed',e); }
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────
let cdInterval=null;
function getNextMatch(){ return S.matches.find(m=>m.status==='upcoming'||m.status==='live'); }
function countdownTo(dateStr,timeStr){
  if(!dateStr||timeStr==='TBD') return null;
  const dt=new Date(`${dateStr}T${timeStr}:00+08:00`);
  const diff=dt-new Date();
  if(diff<=0) return null;
  return{d:Math.floor(diff/86400000),h:Math.floor(diff%86400000/3600000),m:Math.floor(diff%3600000/60000),s:Math.floor(diff%60000/1000),diff};
}
function pad(n){return String(n).padStart(2,'0');}

function updateCountdown(){
  const el=document.getElementById('cdDisplay');
  if(!el) return;
  const next=getNextMatch();
  if(!next){el.innerHTML='<span style="color:var(--text3)">No upcoming matches</span>';return;}
  const cd=countdownTo(next.date,next.time);
  if(!cd){el.innerHTML='<span style="color:var(--green)">● Match in progress</span>';return;}
  el.innerHTML=`
    <div class="count-unit"><div class="count-num">${pad(cd.d)}</div><div class="count-label">Days</div></div>
    <div class="count-unit"><div class="count-num">${pad(cd.h)}</div><div class="count-label">Hrs</div></div>
    <div class="count-unit"><div class="count-num">${pad(cd.m)}</div><div class="count-label">Min</div></div>
    <div class="count-unit"><div class="count-num">${pad(cd.s)}</div><div class="count-label">Sec</div></div>`;
}

// ─── REMINDER BANNER ──────────────────────────────────────────────────────
function getReminderInfo(){
  if(!S.mySlot) return null;
  const pending=S.matches.filter(m=>m.status==='upcoming'&&!myPred(m.id));
  if(pending.length===0) return null;
  const next=getNextMatch();
  if(!next) return null;
  const cd=countdownTo(next.date,next.time);
  const hrs=cd?(cd.d*24+cd.h):9999;
  let urgency='normal';
  if(hrs<1) urgency='urgent';
  else if(hrs<24) urgency='warning';
  return{pending:pending.length,next,cd,urgency};
}

function renderReminderBanner(){
  const info=getReminderInfo();
  if(!info) return '';
  const{pending,next,cd,urgency}=info;
  const timeStr=cd?`${cd.d>0?cd.d+'d ':''}${pad(cd.h)}h ${pad(cd.m)}m`:'soon';
  const icons={normal:'📋',warning:'⚠️',urgent:'🚨'};
  const matchday=next.group?`Matchday · Group ${next.group}`:`${ROUND_NAMES[next.round]}`;
  return `<div class="reminder-banner reminder-${urgency}">
    <div class="reminder-icon">${icons[urgency]}</div>
    <div class="reminder-text">
      <div class="reminder-title">You have ${pending} prediction${pending!==1?'s':''} pending for ${matchday} — closes in ${timeStr}</div>
      <div class="reminder-sub">${next.hf} ${next.home} vs ${next.away} ${next.af} · ${next.time} SGT</div>
    </div>
    <button class="btn btn-gold" onclick="showTab('predict')" style="flex-shrink:0;font-size:12px;padding:6px 12px;">Submit →</button>
  </div>`;
}

            Object.keys(ROUND_NAMES).forEach(r=>byRound[r]=0);
            S.matches.forEach(m=>{

              const pred=myPred(m.id);

              if(pts) byRound[m.round]=(byRound[m.round]||0)+pts;

            return `<tr><td><span style="display:inline-flex;align-items:center;gap:7px"><span style="width:10px;height:10px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>${p.nickname}</span></td>${Object.keys(ROUND_NAMES).map(r=>`<td class="pts-cell">${byRound[r]||0}</td>`).join('')}<td class="pts-cell" style="font-size:19px">${p.total}</td></tr>`;

// ─── MODALS ───────────────────────────────────────────────────────────────
let _predMatchId=null, _tempScore={h:1,a:1};
let _resultMatchId=null, _tempResult={h:0,a:0};

function openPredict(matchId){
  const m=S.matches.find(x=>x.id===matchId);
  if(!m||!S.mySlot) return;
  _predMatchId=matchId;
  const isKO=m.round!=='group';
  const ex=myPred(matchId);
  if(isKO) _tempScore=ex?{h:ex.h,a:ex.a}:{h:1,a:1};
  document.getElementById('mTitle').textContent='Your Prediction';
  document.getElementById('mSub').textContent=`${ROUND_NAMES[m.round]} · ${m.time} SGT`;
  document.getElementById('mHF').textContent=m.hf;
  document.getElementById('mHome').textContent=m.home;
  document.getElementById('mAF').textContent=m.af;
  document.getElementById('mAway').textContent=m.away;
  const inp=document.getElementById('mInput');
  if(isKO){
    inp.innerHTML=`
      <div class="modal-label">Predicted score at 90 minutes</div>
      <div class="score-sel">
        <div class="stepper">
          <button class="step-btn" onclick="chScore('h',1)">+</button>
          <div class="score-num" id="sH">${_tempScore.h}</div>
          <button class="step-btn" onclick="chScore('h',-1)">−</button>
        </div>
        <div class="score-sep">–</div>
        <div class="stepper">
          <button class="step-btn" onclick="chScore('a',1)">+</button>
          <div class="score-num" id="sA">${_tempScore.a}</div>
          <button class="step-btn" onclick="chScore('a',-1)">−</button>
        </div>
      </div>`;
  } else {
    const v=ex?ex.result:'h';
    inp.innerHTML=`
      <div class="modal-label">Predicted result</div>
      <select class="result-sel" id="gResult">
        <option value="h" ${v==='h'?'selected':''}>🏠 ${m.home} Win</option>
        <option value="d" ${v==='d'?'selected':''}>🤝 Draw</option>
        <option value="a" ${v==='a'?'selected':''}>✈️ ${m.away} Win</option>
      </select>`;
  }
  document.getElementById('predictOverlay').classList.add('open');
}
function chScore(side,d){
  _tempScore[side]=Math.max(0,Math.min(20,_tempScore[side]+d));
  const el=document.getElementById(side==='h'?'sH':'sA');
  if(el) el.textContent=_tempScore[side];
}
function closePredModal(){ document.getElementById('predictOverlay').classList.remove('open'); }
async function submitPrediction(){
  const m=S.matches.find(x=>x.id===_predMatchId);
  if(!m||!S.mySlot) return;
  const isKO=m.round!=='group';
  if(!S.predictions[S.mySlot]) S.predictions[S.mySlot]={};
  const pred=isKO?{h:_tempScore.h,a:_tempScore.a}:{result:document.getElementById('gResult').value};
  S.predictions[S.mySlot][_predMatchId]=pred;
  closePredModal();
  // Write to sheet
  await writeToSheet('Predictions',{match_id:_predMatchId,slot:S.mySlot,prediction:JSON.stringify(pred),submitted_at:new Date().toISOString()});
  showToast('Prediction saved ✓');
  showTab(S.tab);
}

function openResult(matchId){
  const m=S.matches.find(x=>x.id===matchId);
  if(!m) return;
  _resultMatchId=matchId;
  _tempResult=m.result?{...m.result}:{h:0,a:0};
  document.getElementById('rTitle').textContent='Enter Result';
  document.getElementById('rSub').textContent=`${ROUND_NAMES[m.round]} · Admin`;
  document.getElementById('rHF').textContent=m.hf;
  document.getElementById('rHome').textContent=m.home;
  document.getElementById('rAF').textContent=m.af;
  document.getElementById('rAway').textContent=m.away;
  document.getElementById('rInput').innerHTML=`
    <div class="modal-label">Final score at 90 minutes</div>
    <div class="score-sel">
      <div class="stepper">
        <button class="step-btn" onclick="chResult('h',1)">+</button>
        <div class="score-num" id="rH">${_tempResult.h}</div>
        <button class="step-btn" onclick="chResult('h',-1)">−</button>
      </div>
      <div class="score-sep">–</div>
      <div class="stepper">
        <button class="step-btn" onclick="chResult('a',1)">+</button>
        <div class="score-num" id="rA">${_tempResult.a}</div>
        <button class="step-btn" onclick="chResult('a',-1)">−</button>
      </div>
    </div>`;
  document.getElementById('resultOverlay').classList.add('open');
}
function chResult(side,d){
  _tempResult[side]=Math.max(0,Math.min(20,_tempResult[side]+d));
  const el=document.getElementById(side==='h'?'rH':'rA');
  if(el) el.textContent=_tempResult[side];
}
function closeResultModal(){ document.getElementById('resultOverlay').classList.remove('open'); }
async function submitResult(){
  const m=S.matches.find(x=>x.id===_resultMatchId);
  if(!m) return;
  m.result={h:_tempResult.h,a:_tempResult.a};
  m.status='done';
  S.results[_resultMatchId]={h:_tempResult.h,a:_tempResult.a};
  closeResultModal();
  await writeToSheet('Results',{match_id:_resultMatchId,home_score:_tempResult.h,away_score:_tempResult.a,entered_at:new Date().toISOString(),source:'manual'});
  showToast('Result saved — points updated ✓');
  showTab(S.tab);
}

// ─── ADMIN TOGGLE ─────────────────────────────────────────────────────────
function openAdminToggle(){
  if(S.adminUnlocked){
    S.adminUnlocked=false;
    renderAdminToggleState();
    showToast('Admin mode off');
    showTab(S.tab);
    return;
  }
  document.getElementById('pinError').textContent='';
  document.querySelectorAll('.pin-input').forEach(i=>i.value='');
  document.getElementById('adminOverlay').classList.add('open');
  setTimeout(()=>document.querySelectorAll('.pin-input')[0].focus(),100);
}
function closeAdminOverlay(){ document.getElementById('adminOverlay').classList.remove('open'); }
function checkPin(){
  const pin=Array.from(document.querySelectorAll('.pin-input')).map(i=>i.value).join('');
  if(pin.length<4) return;
  const adminPlayer=S.players.find(p=>p.isAdmin&&p.slot===S.mySlot);
  const storedPin=localStorage.getItem('wc2026_pin_'+S.mySlot);
  if(storedPin&&pin===storedPin){
    S.adminUnlocked=true;
    closeAdminOverlay();
    renderAdminToggleState();
    showToast('Admin mode unlocked 👑');
    showTab(S.tab);
  } else {
    document.getElementById('pinError').textContent='Incorrect PIN. Try again.';
    document.querySelectorAll('.pin-input').forEach(i=>i.value='');
    document.querySelectorAll('.pin-input')[0].focus();
  }
}
function renderAdminToggleState(){
  const btn=document.getElementById('adminToggleBtn');
  if(!btn) return;
  if(S.adminUnlocked){
    btn.style.background='var(--gold)';
    btn.style.color='#000';
    btn.title='Admin mode ON — click to disable';
  } else {
    btn.style.background='';
    btn.style.color='';
    btn.title='Admin mode';
  }
}
function onPinInput(el,idx){
  if(el.value.length===1&&idx<3){
    document.querySelectorAll('.pin-input')[idx+1].focus();
  }
  const pin=Array.from(document.querySelectorAll('.pin-input')).map(i=>i.value).join('');
  if(pin.length===4) checkPin();
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────
let _obStep=1, _obNickname='', _obColor=PLAYER_COLORS[0], _obIsAdmin=false, _obPin='';

function renderOnboarding(){
  document.getElementById('root').innerHTML=`
    <div class="onboard-wrap">
      <div class="onboard-card" id="obCard">
        ${_obStep===1?renderObStep1():_obStep===2?renderObStep2():renderObStep3()}
      </div>
    </div>`;
  if(_obStep===1){
    const input=document.getElementById('obNickname');
    if(input) input.addEventListener('keydown',e=>{ if(e.key==='Enter') obNext1(); });
  }
}

function renderObStep1(){
  return `
    <div class="onboard-logo">⚽ WC2026</div>
    <div class="onboard-sub">FIFA World Cup 2026 Prediction Game</div>
    <div class="onboard-title">Welcome! What's your nickname?</div>

    <div class="onboard-title" style="margin-top:1rem;margin-bottom:0.5rem">Pick your colour</div>
    <div class="color-picker">
      ${PLAYER_COLORS.map(c=>`<div class="color-dot ${_obColor===c?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('')}
    </div>
    <div class="admin-toggle" onclick="toggleObAdmin()">
      <div class="toggle-switch ${_obIsAdmin?'on':''}"><div class="toggle-knob"></div></div>
      <div>
        <div style="font-size:14px;font-weight:500">I am the Admin</div>
        <div style="font-size:12px;color:var(--text3)">Can enter match results</div>
      </div>
    </div>
    <div class="error-msg" id="obErr1"></div>
    <button class="btn btn-gold" style="width:100%;padding:12px;font-size:15px;border-radius:var(--rsm)" onclick="obNext1()">Continue →</button>`;
}

function renderObStep2(){
  return `
    <div class="onboard-logo">⚽ WC2026</div>
    <div class="onboard-sub" style="margin-bottom:1rem">Set your Admin PIN</div>
    <div class="onboard-title">Choose a 4-digit PIN</div>
    <div class="onboard-desc">This PIN unlocks admin features like entering match results. Keep it to yourself.</div>
    <div class="pin-inputs">
      ${[0,1,2,3].map(i=>`<input class="pin-input" id="obPin${i}" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="onObPinInput(this,${i})">`).join('')}
    </div>
    <div class="error-msg" id="obErr2"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1;padding:10px" onclick="_obStep=1;renderOnboarding()">← Back</button>
      <button class="btn btn-gold" style="flex:2;padding:10px;font-size:15px" onclick="obNext2()">Continue →</button>
    </div>`;
}

function renderObStep3(){
  return `
    <div style="font-size:48px;margin-bottom:1rem">🎉</div>
    <div class="onboard-title">You're all set, ${_obNickname}!</div>
    <div class="onboard-desc" style="margin-top:0.5rem">You've been registered as player #${(S.players.length+1)}. Share this app with your mates so they can register too.</div>
    <div style="display:flex;justify-content:center;margin:1.5rem 0">
      ${avatarHtml(_obNickname,_obColor,60)}
    </div>
    <button class="btn btn-gold" style="width:100%;padding:12px;font-size:15px;border-radius:var(--rsm)" onclick="obFinish()">Let's play ⚽</button>`;
}

function selectColor(c){_obColor=c;document.querySelectorAll('.color-dot').forEach(d=>{d.classList.toggle('selected',d.style.background===c||d.style.backgroundColor===c);});}
function toggleObAdmin(){_obIsAdmin=!_obIsAdmin;document.getElementById('root').innerHTML='';renderOnboarding();}
function onObPinInput(el,idx){if(el.value.length===1&&idx<3)document.getElementById('obPin'+(idx+1)).focus();}

function obNext1(){
  const nick=(document.getElementById('obNickname').value||'').trim();
  if(nick.length<2){document.getElementById('obErr1').textContent='Please enter at least 2 characters.';return;}
  if(S.players.find(p=>p.nickname.toLowerCase()===nick.toLowerCase())){document.getElementById('obErr1').textContent='That nickname is already taken!';return;}
  _obNickname=nick;
  if(_obIsAdmin){_obStep=2;renderOnboarding();setTimeout(()=>document.getElementById('obPin0').focus(),100);}
  else{_obStep=3;renderOnboarding();}
}

function obNext2(){
  const pin=[0,1,2,3].map(i=>(document.getElementById('obPin'+i).value||'')).join('');
  if(pin.length<4){document.getElementById('obErr2').textContent='Please enter all 4 digits.';return;}
  _obPin=pin;
  _obStep=3;renderOnboarding();
}

async function obFinish(){
  const slot=S.players.length+1;
  const player={slot,nickname:_obNickname,color:_obColor,isAdmin:_obIsAdmin};
  S.players.push(player);
  S.mySlot=slot;
  S.myNickname=_obNickname;
  S.myColor=_obColor;
  S.isAdmin=_obIsAdmin;
  saveLocal();
  if(_obIsAdmin&&_obPin) localStorage.setItem('wc2026_pin_'+slot,_obPin);
  // Write to sheet
  await writeToSheet('Players',{slot,nickname:_obNickname,color:_obColor,is_admin:_obIsAdmin,pin:'',registered_at:new Date().toISOString()});
  renderFullApp();
}

// ─── MISC ─────────────────────────────────────────────────────────────────
function toggleTheme(){
  S.theme=S.theme==='dark'?'light':'dark';
  document.body.classList.toggle('light',S.theme==='light');
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=S.theme==='dark'?'🌙':'☀️';

function openPlayerMenu(){ showToast('Logged in as '+S.myNickname); }

function showToast(msg,isErr=false){
  const t=document.getElementById('toast');

  setTimeout(()=>t.classList.remove('show'),2800);
